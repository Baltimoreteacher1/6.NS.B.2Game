<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Division Rescue — 6.NS.B.2</title>
<style>
body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#0a2540;
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}
.container{
background:#063247;
padding:30px;
border-radius:16px;
max-width:700px;
width:90%;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
h1{margin-top:0}
button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#0891b2;
color:white;
font-size:18px;
cursor:pointer;
margin:6px;
}
button:hover{background:#0ea5e9}
.choices{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}
.choice{
background:#0e7490;
}
.hidden{display:none}
.stats{margin-top:10px;font-size:18px}
.correct{background:#34d399 !important;color:black}
.incorrect{background:#f87171 !important}
</style>
</head>

<body>

<div class="container" id="start">
<h1>🌊 Ocean Division Rescue</h1>
<p>Solve division problems to repair underwater sensors and guide the submarine.</p>
<button onclick="startGame()">Start Mission</button>
</div>

<div class="container hidden" id="game">
<div class="stats">
<span id="progress"></span> |
<span id="score"></span>
</div>

<h2 id="question"></h2>

<div class="choices" id="choices"></div>

<p id="feedback"></p>
<button class="hidden" id="nextBtn" onclick="nextQuestion()">Next</button>

</div>

<div class="container hidden" id="end">
<h1>Mission Complete</h1>
<p id="finalScore"></p>
<button onclick="location.reload()">Play Again</button>
</div>

<script>

const problems = [
{q:"84 ÷ 4", a:21, c:[21,20,24,18]},
{q:"96 ÷ 3", a:32, c:[32,30,36,29]},
{q:"144 ÷ 6", a:24, c:[24,21,26,18]},
{q:"225 ÷ 5", a:45, c:[45,40,42,50]},
{q:"196 ÷ 7", a:28, c:[28,24,30,26]},
{q:"168 ÷ 4", a:42, c:[42,40,44,38]},
{q:"315 ÷ 9", a:35, c:[35,30,36,40]},
{q:"432 ÷ 6", a:72, c:[72,70,68,76]},
{q:"1248 ÷ 6", a:208, c:[208,206,212,198]},
{q:"1356 ÷ 4", a:339, c:[339,334,342,329]}
]

let index=0
let score=0

function startGame(){
document.getElementById("start").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")
loadQuestion()
}

function loadQuestion(){
let p=problems[index]

document.getElementById("question").textContent=p.q + " = ?"

document.getElementById("progress").textContent="Problem "+(index+1)+" / "+problems.length
document.getElementById("score").textContent="Score: "+score

let box=document.getElementById("choices")
box.innerHTML=""

p.c.sort(()=>Math.random()-0.5).forEach(choice=>{
let b=document.createElement("button")
b.className="choice"
b.textContent=choice
b.onclick=()=>check(choice)
box.appendChild(b)
})
}

function check(val){
let p=problems[index]

document.querySelectorAll(".choice").forEach(b=>{
b.disabled=true
})

if(val===p.a){
score++
document.getElementById("feedback").textContent="Correct!"
}else{
document.getElementById("feedback").textContent="Not quite. Correct answer: "+p.a
}

document.getElementById("nextBtn").classList.remove("hidden")
}

function nextQuestion(){
index++
document.getElementById("feedback").textContent=""
document.getElementById("nextBtn").classList.add("hidden")

if(index>=problems.length){
endGame()
}else{
loadQuestion()
}
}

function endGame(){
document.getElementById("game").classList.add("hidden")
document.getElementById("end").classList.remove("hidden")
document.getElementById("finalScore").textContent="You solved "+score+" out of "+problems.length+" correctly."
}

</script>

</body>
</html>
